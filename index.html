<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranking</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="title">🏆 Ranking</div>

  <div style="display:flex; gap:10px;">
    <button class="icon-btn" onclick="location.href='index.html'">🏠</button>
    <button class="icon-btn" onclick="location.href='boisko.html'">⚽</button>
    <button class="icon-btn" onclick="toggleTheme()">🌙</button>
  </div>
</div>

<!-- APP -->
<div class="app">

  <!-- DATA -->
  <div class="date-box">
    <span id="navbarDate"></span>
  </div>

  <!-- BOISKO -->
  <button class="primary-btn" onclick="location.href='boisko.html'">
    ⚽ Umawianie na boisko
    <div class="sub" id="boiskoCounter"></div>
  </button>

  <!-- RANKING -->
  <div class="section">
    <h2>Ranking</h2>
    <div id="rankingList"></div>
  </div>

  <!-- DATA RUNDY -->
  <div class="section" id="dateCard">
    <h2>Data rundy</h2>
    <input type="date" id="datePicker">
  </div>

  <!-- GŁOSOWANIE + ADMIN -->
  <div id="panels"></div>

  <!-- LOGIN -->
  <div class="section" id="loginSection">
    <h2>Logowanie</h2>
    <input id="email" placeholder="email">
    <input id="password" type="password" placeholder="hasło">
    <button class="primary-btn" onclick="login()">Zaloguj</button>
  </div>

  <!-- USER -->
  <div class="section" id="userSection" style="display:none;">
    <div id="userEmail"></div>
    <button class="primary-btn" onclick="logout()">Wyloguj</button>
  </div>

</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- JS -->
<script src="main.js"></script>

</body>
</html>
