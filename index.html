<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ranking Chwały</title>
<link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="title">🏆 Ranking</div>

  <div class="top-actions">
    <button class="icon-btn" onclick="toggleTheme()">🌙</button>
  </div>
</div>

<!-- MAIN -->
<div class="app">

  <!-- DATA -->
  <div class="date-box">
    <span id="navbarDate"></span>
  </div>

  <!-- BOISKO -->
  <button class="primary-btn" onclick="location.href='boisko.html'">
    ⚽ Umawianie na boisko  
    <div class="sub" id="boiskoCounter"></div>
  </button>

  <!-- RANKING -->
  <div class="section">
    <h2>Ranking</h2>
    <div id="rankingList"></div>
  </div>

  <!-- DATE PICKER -->
  <div class="section" id="dateCard">
    <h2>Data rundy</h2>
    <input type="date" id="datePicker">
  </div>

  <!-- PANELS -->
  <div id="panels"></div>

  <!-- LOGIN -->
  <div class="section" id="loginBox">
    <h2>Logowanie</h2>
    <input id="email" placeholder="email">
    <input id="password" type="password" placeholder="hasło">
    <button onclick="login()">Zaloguj</button>
    <div id="loginError"></div>
  </div>

  <!-- USER -->
  <div class="section" id="userBox" style="display:none;">
    <div id="userName"></div>
    <button onclick="logout()">Wyloguj</button>
  </div>

</div>

</body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="main.js"></script>
</html>
