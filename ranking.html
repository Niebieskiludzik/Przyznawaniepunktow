<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Ranking miesięczny</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
  <div class="nav-left">🏆 Ranking Chwały</div>
  <div class="nav-center">
    <span id="navbarDate"></span>
  </div>
  <div class="nav-right">
    <div id="loginBox">
      <input id="email" placeholder="email">
      <input id="password" type="password" placeholder="hasło">
      <button onclick="login()">Zaloguj</button>
      <div id="loginError"></div>
    </div>
    <div id="userBox" style="display:none;">
      <span id="userName"></span>
      <button onclick="logout()">Wyloguj</button>
    </div>
  </div>
</div>

<div class="container">
  
  <h1>🏆 Ranking miesięczny</h1>
  
  <a href="index.html" class="backButton">
    ⬅ Powrót do rankingu
  </a>

  <div class="ranking-header">
    <input type="month" id="monthPicker">
  </div>

  <div id="rankingList">Ładowanie...</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="auth.js"></script>
<script src="ranking.js"></script>

</body>
</html>
