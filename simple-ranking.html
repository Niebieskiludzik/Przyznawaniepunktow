<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>⚡ Prosty ranking</title>

  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .rank-item {
      display: flex;
      justify-content: space-between;
      background: #1c1c1c;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 8px;
      align-items: center;
    }

    .rank-left {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .rank-position {
      font-weight: bold;
      font-size: 18px;
      width: 40px;
    }

    .rank-name {
      font-size: 16px;
    }

    .rank-points {
      font-weight: bold;
      font-size: 16px;
    }

    .top1 { background: #2a2a00; }
    .top2 { background: #1f1f1f; }
    .top3 { background: #1a1a1a; }

    .loading {
      text-align: center;
      margin-top: 50px;
      opacity: 0.7;
    }

    .back-btn {
      display: inline-block;
      margin-bottom: 15px;
      color: #aaa;
      text-decoration: none;
    }

    .back-btn:hover {
      color: white;
    }
  </style>
</head>

<body>

<div class="navbar">

  <div class="nav-left">
    Prosty ranking
  </div>

  <div class="nav-center">
    <span id="navbarDate"></span>
  </div>

  <div class="nav-right">

    <div id="loginBox">
      <input id="email" placeholder="email">
      <input id="password" type="password" placeholder="hasło">
      <button id="loginBtn" onclick="login()">Zaloguj</button>
      <div id="loginError"></div>
    </div>

    <div id="userBox" style="display:none;">
      <span id="userName"></span>
      <button onclick="logout()">Wyloguj</button>
    </div>

  </div>

</div>
  
<div class="container">

  <a href="index.html" class="btn">⬅ Powrót</a>

  <h1>Prosty ranking</h1>

  <div id="ranking">
    <div class="loading">Ładowanie...</div>
  </div>

</div>

<!-- KOLEJNOŚĆ MA ZNACZENIE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="auth.js"></script>
<script src="simple-ranking.js"></script>

</body>
</html>
