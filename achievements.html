<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Profil gracza</title>

  <link rel="stylesheet" href="style.css">

  <!-- supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div class="navbar">
    <div class="nav-left">Profil</div>
    <div class="nav-center">
      <span id="navbarDate"></span>
    </div>

    <div class="nav-right">

      <div id="loginBox">
        <input id="email" placeholder="email">
        <input id="password" type="password" placeholder="hasło">
        <button id="loginBtn" onclick="login()">Zaloguj</button>
        <div id="loginError"></div>
      </div>

      <div id="userBox" style="display:none;">
        <span id="userName"></span>
        <button onclick="logout()">Wyloguj</button>
      </div>

    </div>
  </div>

  <div id="profileCard"></div>

  <!-- Zakładki -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="stats-tab">📊 Statystyki</button>
    <button class="tab-btn" data-tab="achievements-tab">🏅 Osiągnięcia</button>
  </div>

  <!-- Statystyki -->
  <div class="tab-content active" id="stats-tab"></div>

  <!-- Osiągnięcia -->
  <div class="tab-content" id="achievements-tab">
    <div class="profile-section-title">
      🏅 Osiągnięcia: <span id="achievements-count">0/0</span>
    </div>
    <div id="achievements-list" class="achievements-list"></div>
  </div>

  <!-- KOLEJNOŚĆ MA ZNACZENIE -->
  <script src="auth.js"></script>
  <script src="achievements.js"></script>

</body>
</html>
