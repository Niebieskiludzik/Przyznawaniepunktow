<!DOCTYPE html>
<html lang="pl">
<head>

<meta charset="UTF-8">

<title>⚽ Typowanie Mundialu</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="nav.css">
<link rel="stylesheet" href="typowanie.css">

<link rel="icon" type="image/png" href="favicon.png">

</head>

<body>

<div class="navbar">

  <div class="nav-left">
    🏆 Ranking Chwały
  </div>

  <div class="nav-center">
    <span id="navbarDate"></span>
  </div>

  <div class="nav-right">

    <div id="loginBox">

      <input id="email" placeholder="email">

      <input id="password"
             type="password"
             placeholder="hasło">

      <button onclick="login()">
        Zaloguj
      </button>

      <div id="loginError"></div>

    </div>

    <div id="userBox" style="display:none;">
      <span id="userName"></span>
      <button onclick="logout()">
        Wyloguj
      </button>
    </div>

  </div>

</div>

<div class="container">

  <div class="card page-header">

    <h1>🏆 Typowanie Mundialu</h1>

    <p>
      Typuj wyniki spotkań i walcz o miano najlepszego eksperta.
    </p>

  </div>

  <div
    id="adminPanel"
    class="card admin-panel"
    style="display:none;"
  >

    <h2>⚙️ Panel Admina</h2>

    <div class="admin-form">

      <select id="homeCountry"></select>

      <select id="awayCountry"></select>

      <input
        id="matchDate"
        type="datetime-local"
      >

      <button id="addMatchBtn">
        Dodaj mecz
      </button>

    </div>

  </div>

  <div id="matchesList"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>
<script src="typowanie.js"></script>

</body>
</html>
