<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boisko</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="title">⚽ Boisko</div>

  <div style="display:flex; gap:10px;">
    <button class="icon-btn" onclick="location.href='index.html'">🏠</button>
    <button class="icon-btn" onclick="toggleTheme()">🌙</button>
  </div>
</div>

<div class="app">

  <div class="section">
    <h2>Umawianie</h2>

    <input type="date" id="date">
    <input type="time" id="from">
    <input type="time" id="to">
    <input placeholder="Notatka" id="note">

    <button class="primary-btn" onclick="join()">Zapisz się</button>
  </div>

  <div class="section">
    <h2>Lista</h2>
    <div id="list"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="boisko.js"></script>

</body>
</html>
